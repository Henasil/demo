{% extends 'base.html' %}
{% block title %}Новая заявка | Пассажиры РФ{% endblock %}
{% block content %}
<section class="form-page">
    <form class="card form-card wide needs-validation" method="post" novalidate>
        {% csrf_token %}
        <p class="eyebrow">Запись на курс</p>
        <h1>Новая заявка на обучение</h1>
        {% for field in form %}
            <label>
                <span>{{ field.label }}</span>
                {{ field }}
                {% for error in field.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
            </label>
        {% endfor %}
        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Отправить заявку</button>
            <a class="btn btn-outline-secondary" href="{% url 'profile' %}">Назад</a>
        </div>
    </form>
</section>
{% endblock %}
